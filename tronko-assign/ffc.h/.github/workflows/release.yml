name: Release

on:
  push:
    tags:
      - 'v2[0-9].[0-9][0-9].[0-9]*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify tag and single-header are in sync
        run: |
          expected_tag="$(make -s print_version_tag)"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "error: tag ${GITHUB_REF_NAME} does not match src/api.h version ${expected_tag}"
            exit 1
          fi

          make ffc.h
          git diff --exit-code ffc.h

      - name: Generate checksum
        run: sha256sum ffc.h > ffc.h.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.VERSION }}
          body: |
            ## ${{ steps.version.outputs.VERSION }}

            Drop `ffc.h` into your project and parse some floats or whatever

            **Verify checksum:**
            ```
            sha256sum -c ffc.h.sha256
            ```
          files: |
            ffc.h
            ffc.h.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: true
