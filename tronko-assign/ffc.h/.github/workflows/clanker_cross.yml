name: Cross-Arch CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  native:
    name: Linux amd64 (native)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: make test
        run: make test
      - name: make example
        run: make example
      - name: Check dirty single-header
        run: git diff --exit-code ffc.h

  cross:
    name: Linux ${{ matrix.arch }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: i386
            distro: debian:bookworm
            install: apt-get update && apt-get install -y build-essential clang
          # more archs here
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - name: Build and test (${{ matrix.arch }})
        run: |
          docker run --rm \
            --platform linux/${{ matrix.arch == 'i386' && '386' || matrix.arch }} \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            ${{ matrix.distro }} \
            bash -c "
              ${{ matrix.install }} &&
              touch ffc.h &&
              make test &&
              make example 
            "

  aarch64:
    name: Linux aarch64 (native)
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential clang
      - name: make test
        run: touch ffc.h && make test
      - name: make example
        run: make example
